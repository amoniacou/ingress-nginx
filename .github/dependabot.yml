version: 2
updates:
  # --- Залишаємо тільки оновлення для екшнів у sync-upstream-releases.yaml ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "area/dependency"
      - "release-note-none"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"