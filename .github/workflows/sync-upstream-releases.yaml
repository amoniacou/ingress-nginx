name: TEST Build Upstream Releases

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      # 1. Fetch the latest tag from Chainguard fork
      - name: Get latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest tag from the Chainguard fork of ingress-nginx
          RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/chainguard-forks/ingress-nginx/tags)
          
          # Check if the response is a valid JSON array
          if echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
            LATEST_TAG=$(echo "$RESPONSE" | jq -r '.[0].name')
            echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "Latest tag in Chainguard: $LATEST_TAG"
          else
            echo "API GitHub returned an error instead of a tag list:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

      # 2. CLONE CHAINGUARD REPOSITORY
      - name: Checkout upstream tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 'chainguard-forks/ingress-nginx'
          ref: ${{ steps.upstream.outputs.tag }}
          fetch-depth: 0

      # 3. Set up the build environment
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and push the image under a TEST tag
      - name: Build and Push Controller Image to amoniacou GHCR
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          REGISTRY: ghcr.io/amoniacou/ingress-nginx
          IMAGE: controller
        run: |
          echo "Starting the TEST build for Chainguard release: $TAG..."
          
          TEST_TAG="${TAG}-pr-test"
          
          # 1. Remove the incorrect user:group in the Dockerfile if it exists
          if [ -f rootfs/Dockerfile ]; then
            sed -i 's/www-data.www-data/www-data:www-data/g' rootfs/Dockerfile
          elif [ -f Dockerfile ]; then
            sed -i 's/www-data.www-data/www-data:www-data/g' Dockerfile
          fi
          
          # 2. Check if NGINX_BASE file exists and read its content, otherwise use a fallback image
          if [ -f NGINX_BASE ]; then
            CLEAN_BASE_IMAGE=$(cat NGINX_BASE | tr -d '\r\n')
          else
            echo "NGINX_BASE not found in this tag, using fallback image."
            CLEAN_BASE_IMAGE="registry.k8s.io/ingress-nginx/nginx:v2.2.8"
          fi
          
          echo "Using BASE_IMAGE: $CLEAN_BASE_IMAGE"
          
          # 3. Run the build
          make REGISTRY=$REGISTRY TAG=$TEST_TAG BASE_IMAGE=$CLEAN_BASE_IMAGE build image push
          
          echo "Successfully processed TEST release $REGISTRY/$IMAGE:$TEST_TAG"