name: TEST Build Upstream Releases

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Specify the version to build (e.g., controller-v1.15.8). Leave empty to fetch the latest release from Chainguard.'
        required: false
        default: '' 

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      # 1. Fetch the latest tag from Chainguard fork
      - name: Get latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            echo "Checking if manually specified version '$MANUAL_VERSION' exists..."
            
            # Check if the specified version exists as a release tag in the chainguard-forks/ingress-nginx repository
            CHECK_TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/chainguard-forks/ingress-nginx/releases/tags/$MANUAL_VERSION")
            
            # If the release tag check fails, check if it exists as a git tag
            if [ "$CHECK_TAG_STATUS" != "200" ]; then
              CHECK_TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/chainguard-forks/ingress-nginx/git/ref/tags/$MANUAL_VERSION")
            fi
            
            if [ "$CHECK_TAG_STATUS" != "200" ]; then
              echo "Error: Tag '$MANUAL_VERSION' does not exist in chainguard-forks/ingress-nginx repository!"
              exit 1
            fi
            
            echo "Confirmed! Tag '$MANUAL_VERSION' exists."
            echo "tag=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "No version specified, fetching the latest release from GitHub API..."
            
            # Get the list of releases from the chainguard-forks/ingress-nginx repository
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/chainguard-forks/ingress-nginx/releases?per_page=50")
            
            if echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
              # Get the latest tag that matches the pattern "controller-vX.Y.Z"
              LATEST_TAG=$(echo "$RESPONSE" | jq -r '.[].tag_name' | grep -E '^controller-v[0-9]+\.[0-9]+' | sort -V | tail -n 1)
              
              if [ -z "$LATEST_TAG" ]; then
                echo "Error: No valid releases found matching the controller-vX.Y.Z pattern."
                exit 1
              fi
              
              echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
              echo "Latest tag found: $LATEST_TAG"
            else
              echo "API GitHub returned an error instead of a release list:"
              echo "$RESPONSE" | jq .
              exit 1
            fi
          fi

      # 2. CLONE CHAINGUARD REPOSITORY
      - name: Checkout upstream tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 'chainguard-forks/ingress-nginx'
          ref: ${{ steps.upstream.outputs.tag }}
          fetch-depth: 0

      # 3. Set up the build environment
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and push the image under a TEST tag
      - name: Build and Push Controller Image to amoniacou GHCR
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          REGISTRY: ghcr.io/amoniacou/ingress-nginx
          IMAGE: controller
          FULL_IMAGE_NAME: ghcr.io/amoniacou/ingress-nginx/controller:${{ steps.upstream.outputs.tag }}-pr-test
        run: |
          echo "Starting the TEST build for Chainguard release: $TAG..."
          
          if [ -f rootfs/Dockerfile ]; then
            sed -i 's/www-data.www-data/www-data:www-data/g' rootfs/Dockerfile
          elif [ -f Dockerfile ]; then
            sed -i 's/www-data.www-data/www-data:www-data/g' Dockerfile
          fi
          
          if [ -f NGINX_BASE ]; then
            CLEAN_BASE_IMAGE=$(cat NGINX_BASE | tr -d '\r\n')
          else
            echo "NGINX_BASE not found in this tag, using fallback image."
            CLEAN_BASE_IMAGE="registry.k8s.io/ingress-nginx/nginx:v2.2.8"
          fi
          
          echo "Using BASE_IMAGE: $CLEAN_BASE_IMAGE"
          
          make REGISTRY=$REGISTRY TAG="${TAG}-pr-test" BASE_IMAGE=$CLEAN_BASE_IMAGE build image
          
          echo "Pushing image to GHCR: $FULL_IMAGE_NAME"
          docker push "$FULL_IMAGE_NAME"
          
          echo "Successfully processed TEST release!"