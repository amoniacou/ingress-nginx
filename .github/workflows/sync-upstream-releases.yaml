name: Sync & Build Upstream Releases

on:
  schedule:
    - cron: '0 */3 * * *'  # Run every 3 hours to check for new upstream releases
  workflow_dispatch:       # Manual trigger from the interface
    inputs:
      version:
        description: 'Specify the version to build (e.g., ingress-nginx-3.15.2). Leave empty for auto-detect.'
        required: false
        default: '' 

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      # 1. Get version (automatically or manually specified with validation)
      - name: Get latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            echo "Checking if manually specified version '$MANUAL_VERSION' exists..."
            
            CHECK_TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/chainguard-forks/ingress-nginx/releases/tags/$MANUAL_VERSION")
            if [ "$CHECK_TAG_STATUS" != "200" ]; then
              CHECK_TAG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/chainguard-forks/ingress-nginx/git/ref/tags/$MANUAL_VERSION")
            fi
            
            if [ "$CHECK_TAG_STATUS" != "200" ]; then
              echo "Error: Tag '$MANUAL_VERSION' does not exist in chainguard-forks/ingress-nginx repository!"
              exit 1
            fi
            
            echo "tag=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using manual tag: $MANUAL_VERSION"
          else
            echo "No version specified, fetching the latest release from GitHub API..."
            
            # Get the list of releases from the GitHub API
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/chainguard-forks/ingress-nginx/releases?per_page=50")
            
            if echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
              # Get the latest tag that matches the pattern "controller-vX.Y.Z"
              LATEST_TAG=$(echo "$RESPONSE" | jq -r '.[].tag_name' | grep -E '^controller-v[0-9]+\.[0-9]+' | sort -V | tail -n 1)
              
              if [ -z "$LATEST_TAG" ]; then
                echo "Error: No valid releases found matching the controller-vX.Y.Z pattern."
                exit 1
              fi
              
              echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
              echo "Latest tag found: $LATEST_TAG"
            else
              echo "API GitHub returned an error instead of a release list:"
              echo "$RESPONSE" | jq .
              exit 1
            fi
          fi

      # 2. Check if image already exists in GHCR (skip build if it does)
      - name: Check if image exists in our GHCR
        id: check_ghcr
        run: |
          if docker pull ghcr.io/amoniacou/ingress-nginx/controller:${{ steps.upstream.outputs.tag }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image for version ${{ steps.upstream.outputs.tag }} already exists in GHCR. Skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New release detected! Image ${{ steps.upstream.outputs.tag }} is missing in GHCR. Proceeding with build."
          fi

      # 3. Clone the upstream repository at the specified tag (only if the image doesn't exist)
      - name: Checkout upstream tag
        if: steps.check_ghcr.outputs.exists == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 'chainguard-forks/ingress-nginx'
          ref: ${{ steps.upstream.outputs.tag }}
          fetch-depth: 0

      # 4. Set up Go, QEMU, and Docker Buildx (only if the image doesn't exist)
      - name: Set up Go
        if: steps.check_ghcr.outputs.exists == 'false'
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod' #Chainguard release uses go.mod to specify the Go version, so we can use that to set up the correct Go version.

      - name: Set up QEMU
        if: steps.check_ghcr.outputs.exists == 'false'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: steps.check_ghcr.outputs.exists == 'false'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: steps.check_ghcr.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build and push the controller image to GHCR (only if the image doesn't exist)
      - name: Build and Push Controller Image to amoniacou GHCR
        if: steps.check_ghcr.outputs.exists == 'false'
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          REGISTRY: ghcr.io/amoniacou/ingress-nginx
          IMAGE: controller
          FULL_IMAGE_NAME: ghcr.io/amoniacou/ingress-nginx/controller:${{ steps.upstream.outputs.tag }}
        run: |
          echo "Starting the production build for Chainguard release: $TAG..."
          
          # Fix user syntax in Dockerfile
          if [ -f rootfs/Dockerfile ]; then
            sed -i 's/www-data.www-data/www-data:www-data/g' rootfs/Dockerfile
          elif [ -f Dockerfile ]; then
            sed -i 's/www-data.www-data/www-data:www-data/g' Dockerfile
          fi
          
          # Determine the base image from the NGINX_BASE file if it exists, otherwise use a fallback image
          if [ -f NGINX_BASE ]; then
            CLEAN_BASE_IMAGE=$(cat NGINX_BASE | tr -d '\r\n')
          else
            echo "NGINX_BASE not found in this tag, using fallback image."
            CLEAN_BASE_IMAGE="registry.k8s.io/ingress-nginx/nginx:v2.2.8"
          fi
          
          echo "Using BASE_IMAGE: $CLEAN_BASE_IMAGE"
          
          # Run the build using the original Makefile
          make REGISTRY=$REGISTRY TAG=$TAG BASE_IMAGE=$CLEAN_BASE_IMAGE build image
          
          echo "Pushing image to GHCR: $FULL_IMAGE_NAME"
          docker push "$FULL_IMAGE_NAME"
          
          echo "Successfully processed release $TAG!"